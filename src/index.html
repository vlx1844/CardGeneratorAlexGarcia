<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Generador de Cartas</title>
</head>
<body onload="generarCarta()">

  <div class="controls">
    <input type="number" id="widthInput" placeholder="Ancho" value="300">
    <input type="number" id="heightInput" placeholder="Alto" value="450">
    <button onclick="generarCarta()">Nueva Carta</button>
  </div>

  <div id="cardContainer" class="card">
    <div class="top-suit"></div>
    <div class="number"></div>
    <div class="bottom-suit"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
